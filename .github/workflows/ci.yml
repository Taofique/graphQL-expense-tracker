name: Node CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json # ← correct field name

      - name: Install dependencies
        run: npm ci # ← faster, stricter, correct for CI

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
